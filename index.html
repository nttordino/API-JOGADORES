<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Explorador de jogadores</title>
    <link rel="stylesheet" href="style.css">
    <script src="script.js" defer></script>
    <link rel="icon" href="./fotos/Icon-bola.svg">
</head>
<body>
      <div class="container">

        <h1>Explorador de jogadores de Futebol</h1>

        <div class="controls">
            <button id="randomBtn">🎲 JOGADOR Aleatório</button>
        </div>

        <!-- Busca -->
        <div class="search">
            <input
                type="text"
                id="breedInput"
                placeholder="Digite o nome de um jogador (ex: Neymar ( MAIOR 👑 ), Cristiano R. (🤢))"
            >
            <button id="searchBtn">🔍 Procurar </button>
        </div>
        <!-- Área dos jogadores -->
        <div class="jogador-area">
            <img src="" alt="jogador" id="jogadorImage">
            <div id="breedName"></div>
        </div>

        <!-- Botão aleatório -->

    </div>
</body>
</html>
